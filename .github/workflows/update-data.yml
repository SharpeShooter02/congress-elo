name: Refresh leaderboard data

# Rebuilds data.json / data.js from Stock Watcher + yfinance and commits them.
on:
  schedule:
    - cron: "0 11 * * 1-5"      # weekdays at 11:00 UTC
  workflow_dispatch:            # lets you trigger a run manually from the Actions tab

permissions:
  contents: write               # needed to commit the refreshed data back

concurrency:
  group: refresh-data
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: pip install yfinance pandas requests

      - name: Build leaderboard data
        run: python build_leaderboard.py

      - name: Commit refreshed data
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add -f data.json data.js member
          if git diff --cached --quiet; then
            echo "No data changes to commit."
          else
            git commit -m "chore: refresh leaderboard data [skip ci]"
            git push
          fi
